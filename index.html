<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
      integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="titulo">Blackjack - Juego de Cartas</header>

    <div class="row mt-2">
      <div id="divBotones" class="col text-center">
        <button class="btn btn-primary">Nuevo Juego</button>
        <button id="btnPedir" class="btn btn-primary">Pedir Carta</button>
        <button class="btn btn-danger">Detener</button>
      </div>
    </div>

    <div class="row container">
      <div class="col">
        <h1>Jugador 1 - <small>0</small></h1>
        <div id="jugador-cartas">
          <img class="carta" src="assets/cartas/10C.png" />
          <img class="carta" src="assets/cartas/10C.png" />
          <img class="carta" src="assets/cartas/10C.png" />
          <img class="carta" src="assets/cartas/10C.png" />
        </div>
      </div>
    </div>

    <div class="row container mt-2">
      <div class="col">
        <h1>Computadora - <small>0</small></h1>
        <div id="computadora-cartas">
          <img class="carta" src="assets/cartas/2H.png" />
          <img class="carta" src="assets/cartas/3H.png" />
          <img class="carta" src="assets/cartas/5H.png" />
          <img class="carta" src="assets/cartas/9H.png" />
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.6/underscore-min.js"></script>
    <script src="assets/js/juego.js"></script>
  </body>
</html>
